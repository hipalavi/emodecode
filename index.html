const LIKERT_LABELS = ["Strongly Disagree","Disagree","Neutral","Agree","Strongly Agree"];

function RadarChart({ dimensions, size=280 }) {
  const cx=size/2, cy=size/2, r=size*0.38;
  const keys=Object.keys(dimensions), n=keys.length;
  const pt=(i,val)=>{ const a=(Math.PI*2*i)/n-Math.PI/2, d=(val/100)*r; return [cx+d*Math.cos(a),cy+d*Math.sin(a)]; };
  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:"100%",maxWidth:size}}>
      {[25,50,75,100].map(ring=>(
        <polygon key={ring} points={keys.map((_,i)=>pt(i,ring).join(",")).join(" ")} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="1"/>
      ))}
      {keys.map((_,i)=>{ const [x,y]=pt(i,100); return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>; })}
      <polygon points={keys.map((k,i)=>pt(i,dimensions[k]).join(",")).join(" ")} fill="rgba(212,168,67,0.15)" stroke="#D4A843" strokeWidth="2"/>
      {keys.map((k,i)=>{ const [x,y]=pt(i,dimensions[k]); return <circle key={k} cx={x} cy={y} r={4} fill={DIMENSIONS[k].color}/>; })}
      {keys.map((k,i)=>{ const [x,y]=pt(i,118); return (
        <text key={k} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fill={DIMENSIONS[k].color} fontSize="9" fontWeight="600" fontFamily="'DM Sans',sans-serif">{k} {Math.round(dimensions[k])}%</text>
      );})}
    </svg>
  );
}

function calculateResults(answers) {
  const raw={AA:0,DW:0,EOZ:0,MB:0,SE:0,CD:0};
  let severity="ACUTE", impact="LOW";
  const triggers=[];

  QUESTIONS.forEach((q,idx)=>{
    const ans=answers[idx];
    if(ans===undefined||ans===null) return;
    if(q.type==="scale"&&typeof q.score==="function"){ const s=q.score(ans); Object.entries(s).forEach(([k,v])=>raw[k]+=v); }
    else if(q.type==="single"){ const opt=q.options[ans]; if(opt){ Object.entries(opt.score||{}).forEach(([k,v])=>raw[k]+=v); if(opt.severity) severity=opt.severity; if(opt.impact) impact=opt.impact; } }
    else if(q.type==="multi"&&Array.isArray(ans)){ ans.forEach(i=>{ const opt=q.options[i]; if(opt) Object.entries(opt.score||{}).forEach(([k,v])=>raw[k]+=v); }); }
    else if(q.type==="likert"&&typeof q.score==="function"){ const s=q.score(ans); Object.entries(s).forEach(([k,v])=>raw[k]+=v); }
    else if(q.type==="triggers"&&typeof ans==="object"){ Object.entries(ans).forEach(([area,rating])=>{ if(rating>=4){ const a=q.areas.find(x=>x.label===area); if(a) triggers.push(a.tag); } }); }
  });

  const pct={};
  Object.keys(raw).forEach(k=>{ pct[k]=Math.min(100,Math.round((raw[k]/DIMENSIONS[k].max)*100)); });

  const total=Object.values(pct).reduce((a,b)=>a+b,0);
  const maxVal=Math.max(...Object.values(pct));

  let primary;
  if(maxVal<=20&&total<=60){
    primary="clear_skies";
  } else {
    const sorted=Object.entries(pct).sort((a,b)=>b[1]-a[1]);
    const [topKey]=sorted[0];
    if(pct.AA>0&&pct.DW>0&&Math.abs(pct.AA-pct.DW)<=5&&pct.AA>45&&pct.DW>45) primary="emotional_tug_of_war";
    else if(topKey==="AA"&&pct.DW<40) primary="pressure_cooker";
    else if(topKey==="DW"&&pct.AA<40) primary="running_on_empty";
    else if(topKey==="EOZ"||(pct.AA>45&&pct.DW>45)) primary="emotional_tug_of_war";
    else if(topKey==="MB"||pct.MB>50) primary="silent_storm";
    else if(topKey==="SE"||pct.SE>55) primary="wired_and_tired";
    else if(topKey==="CD"||pct.CD>55) primary="the_overthinker";
    else primary=topKey==="AA"?"pressure_cooker":"running_on_empty";
  }

  const sorted2=Object.entries(pct).sort((a,b)=>b[1]-a[1]);
  let secondary;
  if(primary!=="clear_skies"&&sorted2.length>1){
    const secKey=sorted2[1][0], secVal=sorted2[1][1];
    if(pct.MB>50&&primary!=="silent_storm") secondary="silent_storm";
    else if(pct.SE>55&&primary!=="wired_and_tired") secondary="wired_and_tired";
    else if(pct.CD>55&&primary!=="the_overthinker") secondary="the_overthinker";
    else if(secVal>40){
      const map={AA:"pressure_cooker",DW:"running_on_empty",EOZ:"emotional_tug_of_war",MB:"silent_storm",SE:"wired_and_tired",CD:"the_overthinker"};
      const candidate=map[secKey];
      if(candidate&&candidate!==primary) secondary=candidate;
    }
  }

  const sevMap={
    "ACUTE-LOW":"🟢 Early Signal","ACUTE-MODERATE":"🟡 Developing Pattern",
    "DEVELOPING-LOW":"🟡 Developing Pattern","DEVELOPING-MODERATE":"🟡 Developing Pattern","DEVELOPING-HIGH":"🟠 Active Concern",
    "ESTABLISHED-MODERATE":"🟠 Active Concern","ESTABLISHED-HIGH":"🔴 Established Pattern","ESTABLISHED-SEVERE":"🔴 Established Pattern",
    "CHRONIC-HIGH":"🔴 Established Pattern","CHRONIC-SEVERE":"🔴 Established Pattern",
    "CYCLICAL-LOW":"🟡 Cyclical Pattern","CYCLICAL-MODERATE":"🟡 Cyclical Pattern","CYCLICAL-HIGH":"🟠 Active Concern","CYCLICAL-SEVERE":"🔴 Established Pattern",
  };
  const sevLabel=sevMap[`${severity}-${impact}`]||"🟡 Developing Pattern";

  const matchedPrograms=PROGRAMS
    .filter(p=>p.condition(pct,triggers,severity,primary))
    .map(p=>({...p,score:p.weight(pct)}))
    .sort((a,b)=>b.score-a.score)
    .slice(0,3);
  if(matchedPrograms.length===0) matchedPrograms.push(PROGRAMS.find(p=>p.id==="fluency"));

  const topTriggers=triggers.map(t=>{ const a=QUESTIONS[20].areas.find(x=>x.tag===t); return a?a.label:t; });
  return {raw,pct,primary,secondary,severity,impact,sevLabel,triggers:topTriggers,programs:matchedPrograms};
}

function App() {
  const [phase,setPhase]=useState("welcome");
  const [currentQ,setCurrentQ]=useState(0);
  const [answers,setAnswers]=useState({});
  const [results,setResults]=useState(null);
  const [animating,setAnimating]=useState(false);
  const [email,setEmail]=useState("");
  const [submitState,setSubmitState]=useState("idle"); // idle | sending | done | error

  const sendReport=async()=>{
    if(!email||!email.includes("@")) return;
    setSubmitState("sending");
    try {
      const scriptUrl = "https://script.google.com/macros/s/AKfycbyicUuk_AnufRMbM7k_N1I1tcDwllX1jif8b-JVHlFvfi97t9kAdpkHRUxWcgyNOK6ysg/exec";
      await fetch(scriptUrl, {
        method:"POST",
        mode:"no-cors",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          email,
          profile: results ? PROFILES[results.primary]?.name : "",
          severity: results ? results.severity : "",
          impact: results ? results.impact : "",
          triggers: results ? results.triggers.join(", ") : "",
        }),
      });
      setSubmitState("done");
    } catch(err) {
      setSubmitState("error");
    }
  };

  const progress=((currentQ+1)/QUESTIONS.length)*100;
  const currentSection=SECTIONS.find(s=>currentQ>=s.range[0]&&currentQ<=s.range[1]);

  const goNext=()=>{
    setAnimating(true);
    setTimeout(()=>{
      if(currentQ<QUESTIONS.length-1){ setCurrentQ(currentQ+1); }
      else { const r=calculateResults(answers); setResults(r); setPhase("results"); }
      setAnimating(false);
    },300);
  };

  const goBack=()=>{
    if(currentQ>0){ setAnimating(true); setTimeout(()=>{ setCurrentQ(currentQ-1); setAnimating(false); },300); }
  };

  const setAnswer=val=>setAnswers({...answers,[currentQ]:val});

  const canProceed=()=>{
    const q=QUESTIONS[currentQ], a=answers[currentQ];
    if(q.type==="text") return true;
    if(q.type==="triggers") return a&&Object.keys(a).length===q.areas.length;
    return a!==undefined&&a!==null;
  };

  const autoAdvance=val=>{
    setAnswers(prev=>({...prev,[currentQ]:val}));
    setTimeout(()=>{
      setAnimating(true);
      setTimeout(()=>{
        if(currentQ<QUESTIONS.length-1){ setCurrentQ(c=>c+1); }
        else { const r=calculateResults({...answers,[currentQ]:val}); setResults(r); setPhase("results"); }
        setAnimating(false);
      },300);
    },400);
  };

  if(phase==="welcome") return (
    <div style={S.root}>
      <div style={S.welcomeContainer}>
        <div style={S.glowOrb}/>
        <p style={S.eyebrow}>EMOTIONAL DECODED</p>
        <h1 style={S.welcomeTitle}>{"What's Really\nGoing On Inside?"}</h1>
        <p style={S.welcomeSub}>A 7-minute assessment that helps you decode what you're actually feeling — not just what you think you're feeling.</p>
        <p style={S.welcomeDetail}>No labels. No judgment. Just clarity.</p>
        <button style={S.primaryBtn} onClick={()=>setPhase("consent")}>Let's Begin</button>
        <p style={S.welcomeFootnote}>25 questions · 100% confidential</p>
      </div>
    </div>
  );

  if(phase==="consent") return (
    <div style={S.root}>
      <div style={S.consentContainer}>
        <div style={S.consentIcon}>🔒</div>
        <h2 style={S.consentTitle}>Before We Start</h2>
        <p style={S.consentText}>Your responses are confidential and used only to generate your personal Emotional Profile. This is an awareness tool — not a medical or psychological diagnosis.</p>
        <p style={S.consentText}>If you're in crisis or experiencing persistent distress, please reach out to a licensed mental health professional or a crisis helpline in your area.</p>
        <button style={S.primaryBtn} onClick={()=>setPhase("quiz")}>I Understand — Continue</button>
        <button style={S.ghostBtn} onClick={()=>setPhase("welcome")}>Go Back</button>
      </div>
    </div>
  );

  if(phase==="results"&&results){
    const pri=PROFILES[results.primary];
    const sec=results.secondary?PROFILES[results.secondary]:null;
    return (
      <div style={S.root}>
        <div style={S.resultsContainer}>
          <p style={S.eyebrow}>YOUR EMOTIONAL PROFILE</p>
          <h1 style={S.resultsTitle}>{pri.emoji} {pri.name}</h1>
          <p style={S.resultsSummary}>{pri.summary}</p>
          <div style={S.radarWrap}><RadarChart dimensions={results.pct}/></div>
          <div style={S.dimSection}>
            <h3 style={S.dimTitle}>Your Dimension Breakdown</h3>
            {Object.entries(results.pct).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
              <div key={k} style={S.dimRow}>
                <div style={S.dimLabel}>
                  <span style={{color:DIMENSIONS[k].color,fontWeight:700,fontSize:12}}>{k}</span>
                  <span style={S.dimName}>{DIMENSIONS[k].name}</span>
                </div>
                <div style={S.barTrack}><div style={{...S.barFill,width:`${v}%`,background:DIMENSIONS[k].color}}/></div>
                <span style={S.dimPct}>{v}%</span>
              </div>
            ))}
          </div>
          <div style={S.profileCard}>
            <h3 style={S.profileCardTitle}>{pri.emoji} Primary: {pri.name}</h3>
            <p style={S.profileDesc}>{pri.description}</p>
            <p style={S.practicesLabel}>Recommended practices:</p>
            {pri.practices.map((p,i)=><div key={i} style={S.practiceItem}><span style={S.practiceArrow}>→</span>{p}</div>)}
          </div>
          {sec&&(
            <div style={S.profileCardAlt}>
              <h3 style={S.profileCardTitle}>{sec.emoji} Secondary: {sec.name}</h3>
              <p style={S.profileDesc}>{sec.description}</p>
              <p style={S.practicesLabel}>Recommended practices:</p>
              {sec.practices.map((p,i)=><div key={i} style={S.practiceItem}><span style={S.practiceArrow}>→</span>{p}</div>)}
            </div>
          )}
          <div style={S.contextCard}>
            <div style={S.contextRow}><span style={S.contextLabel}>Status</span><span style={S.contextValue}>{results.sevLabel}</span></div>
            {results.triggers.length>0&&<div style={S.contextRow}><span style={S.contextLabel}>Top Triggers</span><span style={S.contextValue}>{results.triggers.join(", ")}</span></div>}
            <div style={S.contextRow}><span style={S.contextLabel}>Duration</span><span style={S.contextValue}>{results.severity}</span></div>
            <div style={S.contextRow}><span style={S.contextLabel}>Impact Level</span><span style={S.contextValue}>{results.impact}</span></div>
          </div>
          <div style={S.programsSection}>
            <h3 style={S.programsTitle}>Recommended Programs</h3>
            <p style={S.programsSub}>Based on your profile, these would help most:</p>
            {results.programs.map((prog,i)=>(
              <div key={prog.id} style={S.programCard}>
                <div style={S.programHeader}>
                  <span style={S.programIcon}>{prog.icon}</span>
                  <div><p style={S.programName}>{i+1}. {prog.name}</p><p style={S.programTag}>{prog.tagline}</p></div>
                </div>
                <div style={S.matchBar}><div style={{...S.matchFill,width:`${Math.min(100,Math.round((prog.score/200)*100))}%`}}/></div>
                <button style={S.programBtn}>Learn More</button>
              </div>
            ))}
          </div>
          <div style={S.leadCapture}>
            <h3 style={S.leadTitle}>Get Your Full Report</h3>
            <p style={S.leadSub}>Receive your detailed Emotional Profile by email — plus early access to our programs.</p>
            {submitState==="done" ? (
              <div style={{padding:"16px",borderRadius:12,background:"rgba(91,168,143,0.15)",border:"1px solid rgba(91,168,143,0.3)",color:"#5BA88F",fontSize:14,fontWeight:500}}>
                ✓ Done! Check your inbox — your report is on its way.
              </div>
            ) : submitState==="error" ? (
              <div style={{padding:"16px",borderRadius:12,background:"rgba(232,93,58,0.1)",border:"1px solid rgba(232,93,58,0.3)",color:"#E85D3A",fontSize:14}}>
                Something went wrong. Please try again in a moment.
                <button style={{...S.ghostBtn,marginTop:8,fontSize:12}} onClick={()=>setSubmitState("idle")}>Try Again</button>
              </div>
            ) : (
              <div style={S.emailRow}>
                <input
                  type="email"
                  placeholder="Your email address"
                  value={email}
                  onChange={e=>setEmail(e.target.value)}
                  style={S.emailInput}
                />
                <button
                  style={{...S.emailBtn, opacity: submitState==="sending"||!email?0.6:1, cursor: submitState==="sending"||!email?"not-allowed":"pointer"}}
                  onClick={sendReport}
                  disabled={submitState==="sending"||!email}
                >
                  {submitState==="sending"?"Sending...":"Send Report"}
                </button>
              </div>
            )}
          </div>
          <div style={S.disclaimer}>
            <p>This assessment is designed for personal awareness and emotional education. It is not a medical or psychological diagnostic tool. If you are experiencing persistent distress, please reach out to a licensed mental health professional or contact a crisis helpline in your area.</p>
          </div>
          <button style={S.ghostBtn} onClick={()=>{ setPhase("welcome"); setCurrentQ(0); setAnswers({}); setResults(null); }}>Retake Assessment</button>
        </div>
      </div>
    );
  }

  const q=QUESTIONS[currentQ];
  return (
    <div style={S.root}>
      <div style={S.progressWrap}>
        <div style={S.progressTrack}><div style={{...S.progressFill,width:`${progress}%`}}/></div>
        <div style={S.progressMeta}>
          <span style={S.sectionLabel}>{currentSection?.label}</span>
          <span style={S.qCount}>{currentQ+1} / {QUESTIONS.length}</span>
        </div>
      </div>
      {currentQ===0  &&<p style={S.sectionIntro}>First, let's check in with where you are right now.</p>}
      {currentQ===5  &&<p style={S.sectionIntro}>Now let's zoom out — think about the past 2 to 4 weeks.</p>}
      {currentQ===15 &&<p style={S.sectionIntro}>Almost there. A few quick scenario questions.</p>}
      {currentQ===20 &&<p style={S.sectionIntro}>Last section — let's see where these feelings live.</p>}
      <div style={{...S.questionWrap,opacity:animating?0:1,transform:animating?"translateY(12px)":"translateY(0)"}}>
        <h2 style={S.questionText}>{q.question||q.statement}</h2>

        {q.type==="scale"&&(
          <div style={S.scaleWrap}>
            <div style={S.scaleLabels}><span style={S.scaleMinMax}>{q.minLabel}</span><span style={S.scaleMinMax}>{q.maxLabel}</span></div>
            <div style={S.scaleButtons}>
              {Array.from({length:q.max-q.min+1},(_,i)=>q.min+i).map(n=>(
                <button key={n} style={{...S.scaleBtn,...(answers[currentQ]===n?S.scaleBtnActive:{})}} onClick={()=>autoAdvance(n)}>{n}</button>
              ))}
            </div>
          </div>
        )}

        {q.type==="single"&&(
          <div style={S.optionsWrap}>
            {q.options.map((opt,i)=>(
              <button key={i} style={{...S.optionBtn,...(answers[currentQ]===i?S.optionBtnActive:{})}} onClick={()=>autoAdvance(i)}>{opt.label}</button>
            ))}
          </div>
        )}

        {q.type==="multi"&&(
          <div style={S.optionsWrap}>
            {q.options.map((opt,i)=>{
              const selected=(answers[currentQ]||[]).includes(i);
              return (
                <button key={i} style={{...S.optionBtn,...(selected?S.optionBtnActive:{})}} onClick={()=>{
                  let arr=[...(answers[currentQ]||[])];
                  if(opt.exclusive){ arr=selected?[]:[i]; }
                  else { arr=arr.filter(x=>!q.options[x]?.exclusive); if(selected) arr=arr.filter(x=>x!==i); else arr.push(i); }
                  setAnswer(arr);
                }}>
                  <span style={S.checkbox}>{selected?"☑":"☐"}</span>{opt.label}
                </button>
              );
            })}
            <button style={{...S.nextBtn,marginTop:16,opacity:canProceed()?1:0.4}} disabled={!canProceed()} onClick={goNext}>Continue →</button>
          </div>
        )}

        {q.type==="likert"&&(
          <div style={S.likertWrap}>
            {LIKERT_LABELS.map((label,i)=>{
              const val=i+1;
              return (
                <button key={val} style={{...S.likertBtn,...(answers[currentQ]===val?S.likertBtnActive:{})}} onClick={()=>autoAdvance(val)}>
                  <div style={{...S.likertDot,...(answers[currentQ]===val?S.likertDotActive:{}),width:12+i*4,height:12+i*4}}/>
                  <span style={S.likertLabel}>{label}</span>
                </button>
              );
            })}
          </div>
        )}

        {q.type==="triggers"&&(
          <div style={S.triggersWrap}>
            {q.areas.map(area=>{
              const val=(answers[currentQ]||{})[area.label]||0;
              return (
                <div key={area.label} style={S.triggerRow}>
                  <span style={S.triggerLabel}>{area.label}</span>
                  <div style={S.triggerStars}>
                    {[1,2,3,4,5].map(n=>(
                      <button key={n} style={{...S.starBtn,color:n<=val?"#D4A843":"rgba(255,255,255,0.15)"}}
                        onClick={()=>setAnswer({...(answers[currentQ]||{}),[area.label]:n})}>●</button>
                    ))}
                  </div>
                </div>
              );
            })}
            <button style={{...S.nextBtn,marginTop:20,opacity:canProceed()?1:0.4}} disabled={!canProceed()} onClick={goNext}>Continue →</button>
          </div>
        )}

        {q.type==="text"&&(
          <div style={S.textWrap}>
            <textarea style={S.textArea} rows={4} placeholder="Take your time... or skip this one."
              value={answers[currentQ]||""} onChange={e=>setAnswer(e.target.value)}/>
            <button style={S.nextBtn} onClick={goNext}>
              {currentQ===QUESTIONS.length-1?"See My Results →":"Continue →"}
            </button>
          </div>
        )}
      </div>
      {currentQ>0&&<button style={S.backBtn} onClick={goBack}>← Back</button>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
